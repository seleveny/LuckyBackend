server:
  port: 8080
spring:
  application:
    name: lucky-backend
  r2dbc:
    name: default
    url: r2dbc:mysql://localhost:3306/lucky?useUnicode=true&characterEncoding=utf8
    username: root
    password: Xu914939
    pool:
      enabled: true
      max-size: 50
      initial-size: 30
      max-idle-time: 10000
  # Flyway 数据库迁移配置（使用 JDBC，与 R2DBC 独立）
  flyway:
    enabled: true
    url: jdbc:mysql://localhost:3306/lucky?useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true
    user: root
    password: Xu914939
    locations: classpath:db
    baseline-on-migrate: true
    create-schemas: true
  opensearch:
    uris: http://localhost:9200
    connection-timeout: 5000
    socket-timeout: 60000
  data:
    redis:
      host: localhost
      port: 6379
      database: 1
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 1
        shutdown-timeout: 100ms
